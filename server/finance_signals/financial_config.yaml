scheduler:
  market_interval_seconds: 60
  news_interval_seconds: 300
output:
  status_file: finance_status.json
  time_format: '%Y-%m-%d %H:%M:%S'
  json_indent: 2
  ensure_ascii: false
runtime:
  health_max_staleness_seconds: 420
  health_startup_grace_seconds: 120
ai_insight:
  safe_text: 今日暂无高优先级金融与时政新闻。
  section_separator: ' | '
  max_market_alerts_in_text: 0
  max_news_items_in_text: 5
market_data:
  history_period_days: 180
  history_interval: 1d
  default_drawdown_lookback_days: 120
  price_round_digits: 2
  change_round_digits: 2
  alerting:
    enabled: false
    ntfy_config_file: ../../.tmp/ntfy/notify.env
    state_file: ../.tmp/finance_market_alert_state.json
    cooldown_seconds: 1800
    min_market_alerts: 1
    max_items_in_notification: 3
    task_name: finance-signals-market-alert
  instruments:
  - name: 布伦特原油
    symbol: BZ=F
    rule:
      type: price_gte
      threshold: 90
      description: 价格突破 90
  - name: 现货黄金
    symbol: GC=F
    rule:
      type: change_pct_lte
      threshold: -1.5
      description: 单日跌幅 <= -1.5%
  - name: VIX恐慌指数
    symbol: ^VIX
    rule:
      type: price_gte
      threshold: 30
      description: 指数突破 30
  - name: 纳指100
    symbol: ^NDX
    rule:
      type: drawdown_pct_gte
      threshold: 10
      lookback_days: 120
      description: 较阶段高点回撤 > 10%
news:
  sources:
  - name: Google News 财经
    category: finance
    url: https://news.google.com/rss/search?q=%28%E8%B4%A2%E7%BB%8F+OR+%E7%BE%8E%E8%82%A1+OR+A%E8%82%A1+OR+%E7%BE%8E%E8%81%94%E5%82%A8+OR+%E9%BB%84%E9%87%91+OR+%E5%8E%9F%E6%B2%B9%29+when%3A1d&hl=zh-CN&gl=CN&ceid=CN%3Azh-Hans
  - name: Google News 宏观市场
    category: finance
    url: https://news.google.com/rss/search?q=%28%E9%80%9A%E8%83%80+OR+%E5%88%A9%E7%8E%87+OR+%E5%80%BA%E5%B8%82+OR+%E6%B1%87%E7%8E%87+OR+%E6%B2%B9%E4%BB%B7+OR+%E5%95%86%E5%93%81%29+when%3A1d&hl=zh-CN&gl=CN&ceid=CN%3Azh-Hans
  - name: Google News 国际时政
    category: politics
    url: https://news.google.com/rss/search?q=%28%E6%97%B6%E6%94%BF+OR+%E7%99%BD%E5%AE%AB+OR+%E6%AC%A7%E7%9B%9F+OR+%E5%9B%BD%E5%8A%A1%E9%99%A2+OR+%E4%B8%AD%E7%BE%8E+OR+%E5%85%B3%E7%A8%8E+OR+%E9%80%89%E4%B8%BE%29+when%3A1d&hl=zh-CN&gl=CN&ceid=CN%3Azh-Hans
  poll:
    max_items_per_source: 40
    max_top_items: 5
    recency_max_age_hours: 24
    allow_missing_published: true
    max_unmatched_titles: 5
    stale_after_seconds: 900
    topic_similarity_threshold: 0.55
  filters:
    source_allowlist: []
    source_blocklist: []
    domain_allowlist: []
    domain_blocklist: []
  ranking:
    recency_half_life_hours: 8
    default_keyword_score: 10
    title_keyword_bonus: 6
    missing_timestamp_multiplier: 0.65
    same_topic_source_bonus: 6
    category_base_scores:
      finance: 86
      politics: 80
    keyword_weights:
      财报: 18
      业绩: 16
      降息: 18
      加息: 18
      美联储: 20
      央行: 16
      通胀: 14
      非农: 14
      关税: 16
      制裁: 14
      原油: 18
      黄金: 16
      汇率: 14
      债券: 12
      股市: 12
      资本市场: 12
      白宫: 18
      国务院: 16
