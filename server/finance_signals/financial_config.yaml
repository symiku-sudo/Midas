scheduler:
  market_interval_seconds: 60
  news_interval_seconds: 300

output:
  status_file: "finance_status.json"
  time_format: "%Y-%m-%d %H:%M:%S"
  json_indent: 2
  ensure_ascii: false

runtime:
  health_max_staleness_seconds: 420
  health_startup_grace_seconds: 120

ai_insight:
  safe_text: "市场与舆情暂无异常信号，维持常规观察。"
  section_separator: " | "
  max_market_alerts_in_text: 4
  max_news_items_in_text: 3

market_data:
  history_period_days: 180
  history_interval: "1d"
  default_drawdown_lookback_days: 120
  price_round_digits: 2
  change_round_digits: 2
  instruments:
    - name: "布伦特原油"
      symbol: "BZ=F"
      rule:
        type: "price_gte"
        threshold: 90
        description: "价格突破 90"
    - name: "现货黄金"
      symbol: "GC=F"
      rule:
        type: "change_pct_lte"
        threshold: -1.5
        description: "单日跌幅 <= -1.5%"
    - name: "VIX恐慌指数"
      symbol: "^VIX"
      rule:
        type: "price_gte"
        threshold: 30
        description: "指数突破 30"
    - name: "纳指100"
      symbol: "^NDX"
      rule:
        type: "drawdown_pct_gte"
        threshold: 10
        lookback_days: 120
        description: "较阶段高点回撤 > 10%"

news:
  sources:
    - name: "中东地缘风险"
      url: "https://news.google.com/rss/search?q=%E4%BC%8A%E6%9C%97+OR+%E4%BB%A5%E8%89%B2%E5%88%97+OR+%E9%9C%8D%E5%B0%94%E6%9C%A8%E5%85%B9&hl=zh-CN&gl=CN&ceid=CN:zh-Hans"
  poll:
    max_items_per_source: 40
    max_matched_items: 8
    recency_max_age_hours: 48
    allow_missing_published: true
    max_unmatched_titles: 5
    stale_after_seconds: 900
  ranking:
    recency_half_life_hours: 12
    default_keyword_score: 12
    title_keyword_bonus: 8
    missing_timestamp_multiplier: 0.7
    crisis_up_base_score: 100
    crisis_down_base_score: 40
    keyword_weights:
      "封锁霍尔木兹海峡": 42
      "关闭霍尔木兹海峡": 42
      "断供": 36
      "供应中断": 36
      "航运受阻": 34
      "制裁升级": 30
      "军事升级": 28
      "冲突升级": 28
      "导弹袭击": 26
      "空袭": 24
      "袭击": 22
      "报复性打击": 22
      "打击": 18
      "军事行动": 18
      "战争": 16
      "石油储存设施": 16
      "石油设施": 16
      "油库": 16
      "停火协议": 18
      "停火": 16
      "停战": 16
      "达成协议": 14
      "缓和": 12
      "外交斡旋": 12
    source_weights:
      "Reuters": 18
      "路透": 18
      "Bloomberg": 16
      "彭博社": 16
      "BBC": 12
      "dw.com": 10
      "新华网": 8
      "人民网国际": 6
      "观察者": 4
      "观察者网": 4
      "中国网": 4
  keywords:
    crisis_up:
      - "封锁霍尔木兹海峡"
      - "关闭霍尔木兹海峡"
      - "油轮遇袭"
      - "船只遇袭"
      - "基地遇袭"
      - "导弹袭击"
      - "空袭"
      - "袭击"
      - "报复性打击"
      - "打击"
      - "军事升级"
      - "军事行动"
      - "冲突升级"
      - "战争"
      - "断供"
      - "供应中断"
      - "航运受阻"
      - "制裁升级"
      - "石油储存设施"
      - "石油设施"
      - "油库"
    crisis_down:
      - "停火协议"
      - "重启谈判"
      - "恢复谈判"
      - "和谈"
      - "斡旋"
      - "停火"
      - "停战"
      - "调停"
      - "达成协议"
      - "局势缓和"
      - "缓和"
      - "外交斡旋"
      - "避免升级"
      - "降级"
    exclude_title_if_contains:
      - "六张图看清"
      - "关键航道"
      - "在哪"
      - "是什么"
      - "怎么办"
      - "怎样了"
      - "我们目前知道什么"
    negation_prefixes:
      - "未"
      - "并未"
      - "没有"
      - "并没有"
      - "不会"
      - "尚未"
      - "未曾"
      - "无意"
      - "否认"
      - "并非"
