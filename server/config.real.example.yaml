server:
  host: 0.0.0.0
  port: 8000

llm:
  enabled: true
  api_base: https://generativelanguage.googleapis.com/v1beta/openai
  api_key: "${GEMINI_API_KEY}"
  model: gemini-3-flash-preview
  timeout_seconds: 120

asr:
  mode: faster_whisper
  device: cpu
  model_size: base
  language: zh

bilibili:
  max_video_minutes: 240
  yt_dlp_path: yt-dlp
  ffmpeg_path: ffmpeg

comment_insights:
  enabled: true
  request_timeout_seconds: 12
  max_comments_fetch: 30
  max_comments_for_summary: 16
  max_highlight_items: 3
  max_comment_length: 180

asset_image_fill:
  max_images: 5
  max_image_bytes: 4000000
  fallback_single_image_on_upstream_error: true

runtime:
  temp_dir: .tmp
  log_level: INFO
  backup:
    enabled: true
    interval_seconds: 21600
    startup_delay_seconds: 30
    keep_latest_files: 10

auth:
  access_token: ""

notes_merge:
  semantic_similarity_enabled: true
  semantic_model_name: BAAI/bge-small-zh-v1.5
  semantic_device: cpu
  semantic_max_chars: 2000
  semantic_cache_size: 512

xiaohongshu:
  # 可选：mock / web_readonly
  # - mock: 使用本地示例数据（最安全）
  # - web_readonly: 只读抓取网页内容；单链接总结主要依赖 headers，request_url 仅在列表扫描类能力里使用
  mode: web_readonly
  cookie: ""
  collection_id: ""
  default_limit: 20
  max_limit: 30
  random_delay_min_seconds: 3.0
  random_delay_max_seconds: 10.0
  circuit_breaker_failures: 3
  min_live_sync_interval_seconds: 120
  db_path: .tmp/midas.db
  request_timeout_seconds: 30
  api_base: ""
  mock_notes_path: ""
  web_readonly:
    page_fetch_driver: auto
    # 可选：从浏览器 DevTools 里复制一个已登录的只读请求 URL；常见做法是用“收藏列表”请求。
    request_url: "${XHS_REQUEST_URL}"
    request_method: GET
    # 涉及隐私字段，统一从 .env 注入。
    request_headers:
      Accept: "${XHS_HEADER_ACCEPT}"
      Cookie: "${XHS_HEADER_COOKIE}"
      Origin: "${XHS_HEADER_ORIGIN}"
      Referer: "${XHS_HEADER_REFERER}"
      User-Agent: "${XHS_HEADER_USER_AGENT}"
      X-S: "${XHS_HEADER_X_S}"
      X-S-Common: "${XHS_HEADER_X_S_COMMON}"
      X-T: "${XHS_HEADER_X_T}"
    request_body: ""
    har_capture_path: .tmp/xhs_detail.har
    curl_capture_path: .tmp/xhs.curl
    playwright_user_data_dir: ""
    playwright_channel: ""
    playwright_headless: true
    playwright_collect_page_url_template: "https://www.xiaohongshu.com/user/profile/{user_id}?tab=collect"
    playwright_navigation_timeout_seconds: 30
    playwright_response_timeout_seconds: 12
    playwright_scroll_wait_seconds: 1.0
    playwright_max_idle_rounds: 6
    # auto: 列表正文不足时再请求详情；always: 总是请求详情；never: 只用列表
    detail_fetch_mode: auto
    # 可选：详情接口模板，支持 {note_id} / {xsec_token}
    detail_request_url_template: ""
    detail_request_method: GET
    detail_request_headers: {}
    detail_request_body: ""
    # 以下字段按你的实际响应结构调整
    items_path: data.notes
    note_id_field: note_id
    title_field: title
    content_field_candidates: [desc, content, note_text]
    image_field_candidates: [cover.url_pre, cover.url_default, cover.info_list, image_list, images]
    detail_content_field_candidates: [data.items.0.note_card.desc, data.items.0.note_card.note_display_title, data.note.desc, data.note.note_desc]
    detail_image_field_candidates: [data.items.0.note_card.image_list, data.items.0.note_card.images_list, data.note.image_list, data.note.images]
    source_url_field: url
    max_images_per_note: 32
    host_allowlist: [www.xiaohongshu.com, edith.xiaohongshu.com]
